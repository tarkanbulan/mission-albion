<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔒 Kriz Erken Uyarı Sistemi — Giriş</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f1a2e; font-family:Georgia,"Times New Roman",serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  .lock { background:#0f1a2e; max-width:420px; width:100%; padding:40px; border:1px solid rgba(201,168,76,0.2); text-align:center; }
  .lock h1 { color:#c9a84c; font-size:20px; font-weight:500; letter-spacing:2px; margin-bottom:20px; line-height:1.4; }
  .lock p { color:rgba(247,244,236,0.5); font-size:13px; margin-bottom:24px; font-style:italic; }
  .lock input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.03); border:1px solid rgba(201,168,76,0.15); color:#f7f4ec; font-size:14px; font-family:monospace; text-align:center; letter-spacing:4px; outline:none; }
  .lock input:focus { border-color:var(--gold); }
  .lock .btn { display:inline-block; margin-top:16px; padding:10px 32px; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; text-decoration:none; }
  .lock .btn:hover { background:rgba(201,168,76,0.1); }
  .lock .error { color:#8b1a1a; font-size:12px; margin-top:12px; display:none; }
  .lock .seal { color:rgba(247,244,236,0.2); font-size:10px; margin-top:32px; font-family:monospace; letter-spacing:2px; }
</style>
</head>
<body>
<div class="lock">
  <h1>🔒 KRİZ ERKEN UYARI SİSTEMİ</h1>
  <p>Bu alana erişmek için yetkilendirme gereklidir.</p>
  <input type="password" id="pwd" placeholder="●●●●●●●●" onkeydown="if(event.key==='Enter')check()">
  <div class="btn" onclick="check()">Giriş</div>
  <div class="error" id="err">Yanlış şifre.</div>
  <div class="seal">VERITAS PER SE</div>
</div>
<script>
function check(){
  var p=document.getElementById('pwd').value;
  if(p==='Veritas2026'){
    window.location.href='index.html';
  }else{
    document.getElementById('err').style.display='block';
  }
}
</script>
</body>
</html>
